name: E2E Tests

on:
  # Manually triggered from the Actions tab — choose the branch when running.
  # When triggered by a "/run-e2e" PR comment, the e2e-trigger workflow
  # dispatches this workflow on the PR's branch so the PR's workflow file is
  # used (not main's). The pr_sha / pr_number inputs are set automatically in
  # that case and are used to post a check run back to the PR.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (set automatically by e2e-trigger when triggered via comment)'
        required: false
        default: ''
      pr_sha:
        description: 'PR HEAD SHA (set automatically by e2e-trigger when triggered via comment)'
        required: false
        default: ''

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Create check run (in_progress)
        id: create_check
        if: inputs.pr_sha != ''
        run: |
          CHECK_RUN_ID=$(gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -f name="E2E Tests" \
            -f head_sha="${{ inputs.pr_sha }}" \
            -f status="in_progress" \
            -f details_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq '.id')
          echo "check_run_id=$CHECK_RUN_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: |
          curl -sSL https://dioxus.dev/install.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install npm dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./tailwind.css -o ./assets/tailwind.css

      - name: Build WASM app
        # Produces ./target/dx/pmanga/release/web/public that the Playwright
        # static file server (serve) depends on. The release build is required
        # because the debug build includes Dioxus hot-reload client code whose
        # JS uses ES module export syntax in a non-module script context,
        # producing an uncaught page error. Without this step the directory is
        # missing and the server returns 404 for every request.
        run: dx build --release --platform web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Complete check run (success)
        if: inputs.pr_sha != '' && success()
        run: |
          gh api repos/${{ github.repository }}/check-runs/${{ steps.create_check.outputs.check_run_id }} \
            -X PATCH \
            -f status="completed" \
            -f conclusion="success" \
            -f details_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Complete check run (failure)
        if: inputs.pr_sha != '' && failure()
        run: |
          gh api repos/${{ github.repository }}/check-runs/${{ steps.create_check.outputs.check_run_id }} \
            -X PATCH \
            -f status="completed" \
            -f conclusion="failure" \
            -f details_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
