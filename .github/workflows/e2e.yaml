name: E2E Tests

on:
  # Manually triggered from the Actions tab — choose the PR branch when running.
  workflow_dispatch:
  # Comment "/run-e2e" on any PR to trigger from the PR page itself.
  # The run shows up in the PR's Checks tab and is fully opt-in.
  issue_comment:
    types: [created]

jobs:
  e2e:
    # For issue_comment events only run when:
    #   1. The comment is on a pull request (not a plain issue).
    #   2. The comment body is exactly "/run-e2e".
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/run-e2e')
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Resolve PR head SHA and post pending status
        if: github.event_name == 'issue_comment'
        run: |
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "PR_SHA=$PR_SHA" >> "$GITHUB_ENV"
          gh api repos/${{ github.repository }}/statuses/"$PR_SHA" \
            -f state=pending \
            -f context="E2E Tests" \
            -f description="Running…" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For comment-triggered runs, check out the PR head rather than the
          # default branch that issue_comment events target by default.
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: |
          curl -sSL https://dioxus.dev/install.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install npm dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./tailwind.css -o ./assets/tailwind.css

      - name: Build WASM app
        # Produces ./target/dx/pmanga/debug/web/public that the Playwright
        # static file server (http-server) depends on. Without this step
        # the directory is missing and the server returns 404 for every
        # request, blocking Playwright readiness.
        run: dx build --platform web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Post success status to PR
        if: github.event_name == 'issue_comment' && success()
        run: |
          gh api repos/${{ github.repository }}/statuses/"$PR_SHA" \
            -f state=success \
            -f context="E2E Tests" \
            -f description="All E2E tests passed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post failure status to PR
        if: github.event_name == 'issue_comment' && failure()
        run: |
          gh api repos/${{ github.repository }}/statuses/"$PR_SHA" \
            -f state=failure \
            -f context="E2E Tests" \
            -f description="E2E tests failed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
