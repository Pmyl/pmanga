name: E2E Tests

on:
  # Manually triggered from the Actions tab — choose the branch when running.
  # When triggered by a "/run-e2e" PR comment, the e2e-trigger workflow
  # dispatches this workflow on the PR's branch so the PR's workflow file is
  # used (not main's). The pr_sha / pr_number inputs are set automatically in
  # that case and are used to post a commit status back to the PR.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (set automatically by e2e-trigger when triggered via comment)'
        required: false
        default: ''
      pr_sha:
        description: 'PR HEAD SHA (set automatically by e2e-trigger when triggered via comment)'
        required: false
        default: ''

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Post pending status to PR
        if: inputs.pr_sha != ''
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ inputs.pr_sha }} \
            -f state=pending \
            -f context="E2E Tests" \
            -f description="Running…" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: |
          curl -sSL https://dioxus.dev/install.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install npm dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./tailwind.css -o ./assets/tailwind.css

      - name: Build WASM app
        # Produces ./target/dx/pmanga/release/web/public that the Playwright
        # static file server (serve) depends on. The release build is required
        # because the debug build includes Dioxus hot-reload client code whose
        # JS uses ES module export syntax in a non-module script context,
        # producing an uncaught page error. Without this step the directory is
        # missing and the server returns 404 for every request.
        run: dx build --release --platform web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Post success status to PR
        if: inputs.pr_sha != '' && success()
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ inputs.pr_sha }} \
            -f state=success \
            -f context="E2E Tests" \
            -f description="All E2E tests passed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post failure status to PR
        if: inputs.pr_sha != '' && failure()
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ inputs.pr_sha }} \
            -f state=failure \
            -f context="E2E Tests" \
            -f description="E2E tests failed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
